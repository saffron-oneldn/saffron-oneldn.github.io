<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saffron | Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 680px;
    }

    a.card {
      display: block;
      padding: 1.5rem 1.75rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }

    a.card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }

    a.card .label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.5rem;
    }

    a.card .title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f0f0f0;
    }

    a.card .arrow {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #555;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>

  <h1>Projects</h1>

  <div class="grid">

    <a class="card" href="https://saffron-oneldn.github.io/cafe-sales/" target="_blank" rel="noopener">
      <div class="label">Dashboard</div>
      <div class="title">Cafe Sales</div>
      <div class="arrow">View →</div>
    </a>

    <a class="card" href="https://saffron-oneldn.github.io/class-performance-dashboard/" target="_blank" rel="noopener">
      <div class="label">Dashboard</div>
      <div class="title">Class Performance</div>
      <div class="arrow">View →</div>
    </a>

    <a class="card" href="https://saffron-oneldn.github.io/one-ldn-pt-dashboard/" target="_blank" rel="noopener">
      <div class="label">Dashboard</div>
      <div class="title">Personal Trainer Performance</div>
      <div class="arrow">View →</div>
    </a>
    
  </div>

  <footer>saffron-oneldn.github.io</footer>

</body>
</html>
